services:
  hashstore:
    build: .
    container_name: trt-vps
    hostname: trt-vps
    ports:
      - "8880:80"     # Nginx
      - "5433:5432"   # PostgreSQL (offset to avoid host conflicts)
      - "6380:6379"   # Redis (offset)
      - "4223:4222"   # NATS (offset)
      - "8025:8025"   # Mailpit web UI
    volumes:
      # Mount service binaries and migrations from host builds
      - ./services/trt-auth/bin:/opt/trt-auth/bin
      - ./services/trt-auth/migrations:/opt/trt-auth/migrations
      - ./services/trt-hashstore/bin:/opt/trt-hashstore/bin
      - ./services/trt-hashstore/migrations:/opt/trt-hashstore/migrations
      - ./services/trt-hashstore-storage/bin:/opt/trt-hashstore-storage/bin
      - ./services/trt-hashstore-storage/migrations:/opt/trt-hashstore-storage/migrations
      - ./services/trt-hashstore-capacity/bin:/opt/trt-hashstore-capacity/bin
      - ./services/trt-hashstore-capacity/migrations:/opt/trt-hashstore-capacity/migrations
      - ./services/trt-hashstore-notifier/bin:/opt/trt-hashstore-notifier/bin
      - ./services/trt-hashstore-notifier/migrations:/opt/trt-hashstore-notifier/migrations
      - ./services/trt-hashstore-audit/bin:/opt/trt-hashstore-audit/bin
      - ./services/trt-hashstore-audit/migrations:/opt/trt-hashstore-audit/migrations
      # Notifications API (shares notifier's DB, no separate migrations)
      - ./services/trt-hashstore-notifications/bin:/opt/trt-hashstore-notifications/bin
      # Payments
      - ./services/trt-payments/bin:/opt/trt-payments/bin
      - ./services/trt-payments/migrations:/opt/trt-payments/migrations
      # Jaspr SSR website
      - ./services/trt-jaspr/app:/opt/trt-jaspr/bin/app
      - ./services/trt-jaspr/web:/opt/trt-jaspr/web
      # Persist data across restarts
      - pgdata:/var/lib/postgresql
      - redisdata:/var/lib/redis
      - natsdata:/var/lib/nats/jetstream
      - chunkdata:/data/hashstore/chunks
      - mailpitdata:/data/mailpit
      # Environment file with secrets
      - ./dev.env:/etc/environment:ro
    sysctls:
      # Redis requires vm.overcommit_memory=1 to avoid background-save failures under
      # memory pressure. This is a host-level sysctl — Docker writes it to the host kernel.
      vm.overcommit_memory: 1
    env_file:
      - dev.env

volumes:
  pgdata:
  redisdata:
  natsdata:
  chunkdata:
  mailpitdata:
